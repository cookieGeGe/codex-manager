name: 多平台打包发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 打包 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: codex-register.exe
            asset_name: codex-register-windows-x64.exe
          - os: ubuntu-latest
            artifact_name: codex-register
            asset_name: codex-register-linux-x64
          - os: macos-latest
            artifact_name: codex-register
            asset_name: codex-register-macos-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt pyinstaller

      - name: 打包
        run: |
          pyinstaller codex_register.spec --clean --noconfirm

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
